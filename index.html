<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프리미엄 익명 커뮤니티</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --primary-blue: #007aff;
            --primary-gradient: linear-gradient(135deg, #007aff, #0056b3);
            --text-dark: #1a1a1b;
            --text-gray: #878a8c;
            --border-light: #edeff1;
            --accent-soft: #f6f7f8;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --radius-md: 12px;
        }

        body.dark-mode {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-dark: #e4e6eb;
            --text-gray: #b0b3b8;
            --border-light: #333333;
            --accent-soft: #2a2a2a;
        }

        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); color: var(--text-dark); margin: 0; padding: 0; display: flex; justify-content: center; transition: background-color 0.3s, color 0.3s; }
        .main-wrapper { width: 100%; max-width: 640px; min-height: 100vh; background-color: var(--card-bg); box-shadow: 0 0 40px rgba(0,0,0,0.05); transition: background-color 0.3s; }

        .top-nav { position: sticky; top: 0; background: var(--card-bg); opacity: 0.95; backdrop-filter: blur(8px); padding: 16px 24px; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; z-index: 100; transition: background-color 0.3s; }
        .logo { font-size: 22px; font-weight: 900; letter-spacing: -1px; color: var(--primary-blue); }
        .nav-actions { display: flex; gap: 16px; align-items: center; color: var(--text-dark); }
        
        .editor-container { padding: 24px; border-bottom: 8px solid var(--bg-color); }
        
        .tag-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; padding: 4px; }
        .tag-chip { padding: 8px 14px; border-radius: 12px; font-size: 13px; font-weight: 600; color: var(--text-gray); cursor: pointer; transition: 0.2s; user-select: none; background: var(--accent-soft); border: 1px solid transparent; }
        .tag-chip:hover { background: var(--border-light); }
        .tag-chip.active { background: var(--primary-blue); color: white; box-shadow: 0 4px 10px rgba(0, 122, 255, 0.2); }

        .input-title { width: 100%; border: none; font-size: 22px; font-weight: 800; outline: none; margin-bottom: 12px; background: transparent; color: var(--text-dark); }
        .input-body { width: 100%; border: none; font-size: 16px; line-height: 1.6; outline: none; resize: none; min-height: 120px; font-family: inherit; background: transparent; color: var(--text-dark); }
        
        #imgPreview { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-radius: var(--radius-md); margin-bottom: 15px; display: none; border: 1px solid var(--border-light); }
        
        .editor-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border-light); }
        .tool-icon-btn { color: var(--text-gray); font-size: 20px; cursor: pointer; background: var(--accent-soft); width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: all 0.2s; }
        .tool-icon-btn:hover { background: var(--border-light); color: var(--primary-blue); transform: scale(1.05); }

        .btn-post { background: var(--primary-gradient); color: white; border: none; padding: 10px 24px; border-radius: 25px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 12px rgba(0, 122, 255, 0.2); }
        .btn-post:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0, 122, 255, 0.3); }

        .post-card { padding: 24px; border-bottom: 1px solid var(--border-light); background: var(--card-bg); transition: background-color 0.3s; }
        
        .post-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .post-header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .avatar-box {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #a06dfb, #e06d9a);
            border-radius: var(--radius-xl);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: 800;
            font-size: 18px;
            border: 2px solid #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .post-user-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .name-time-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .post-author {
            margin: 0;
            font-size: 16px;
            font-weight: 800;
            color: var(--text-dark);
        }

        .post-date {
            margin: 0;
            font-size: 13px;
            color: var(--text-gray);
            font-weight: 500;
        }

        .post-tag-badge {
            align-self: flex-start;
            background: rgba(0, 122, 255, 0.08);
            color: var(--primary-blue);
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: 700;
            margin-top: 2px;
        }
        
        .post-actions { display: flex; gap: 8px; }
        .post-action-btn { background: var(--accent-soft); border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; color: var(--text-gray); cursor: pointer; }
        .post-action-btn.delete:hover { color: #ff5252; }

        .post-content h3 { font-size: 20px; margin: 0 0 12px 0; line-height: 1.4; }
        .post-text { font-size: 16px; line-height: 1.7; margin-bottom: 20px; white-space: pre-wrap; }
        .post-image { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-radius: var(--radius-md); margin-bottom: 20px; border: 1px solid var(--border-light); display: block; }
        
        .stats-row { display: flex; gap: 16px; margin-bottom: 20px; font-size: 13px; color: var(--text-gray); font-weight: 500; }
        .btn-group { display: flex; justify-content: space-between; border-top: 1px solid var(--border-light); border-bottom: 1px solid var(--border-light); padding: 10px 0; margin-bottom: 20px; }
        .icon-btn { background: none; border: none; color: var(--text-gray); display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; cursor: pointer; flex: 1; }
        .icon-btn i { font-size: 20px; color: var(--text-dark); }

        .comments-box { background: var(--accent-soft); border-radius: var(--radius-md); padding: 16px; transition: background-color 0.3s; margin-top: 15px; }
        .chat-bubble { display: flex; flex-direction: column; margin-bottom: 12px; }
        .chat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .chat-name { font-size: 11px; font-weight: 700; color: var(--text-gray); }
        .chat-actions { display: flex; gap: 8px; }
        .chat-action-btn { background: none; border: none; font-size: 11px; color: #adb5bd; cursor: pointer; padding: 0; }
        .chat-action-btn:hover { color: var(--text-dark); text-decoration: underline; }
        .chat-text { background: var(--card-bg); padding: 10px 14px; border-radius: 2px 14px 14px 14px; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); max-width: 85%; word-break: break-all; border: 1px solid var(--border-light); }
        
        .comment-input-wrap { display: flex; gap: 10px; margin-top: 15px; }
        .msg-input { flex: 1; border: 1px solid var(--border-light); border-radius: 20px; padding: 10px 16px; font-size: 14px; outline: none; background: var(--card-bg); color: var(--text-dark); }
        .btn-send { background: var(--primary-blue); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-gray); font-size: 15px; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <nav class="top-nav">
            <div class="logo">匿名 SPACE</div>
            <div class="nav-actions">
                <i class="ri-moon-line" id="themeToggle" style="font-size: 22px; cursor: pointer;" onclick="toggleDarkMode()"></i>
                <i class="ri-notification-3-line" style="font-size: 22px; cursor: pointer;" onclick="showNotification()"></i>
            </div>
        </nav>

        <div class="editor-container">
            <div class="tag-group" id="tagList">
                <div class="tag-chip active" onclick="selectTag(this, '☕ 일상')">☕ 일상</div>
                <div class="tag-chip" onclick="selectTag(this, '☁️ 플러피')">☁️ 플러피</div>
                <div class="tag-chip" onclick="selectTag(this, '🔥 핫이슈')">🔥 핫이슈</div>
                <div class="tag-chip" onclick="selectTag(this, '🤫 고민')">🤫 고민</div>
                <div class="tag-chip" onclick="selectTag(this, '💖 연애')">💖 연애</div>
                <div class="tag-chip" onclick="selectTag(this, '💻 직장')">💻 직장</div>
            </div>
            <input type="text" id="postTitle" class="input-title" placeholder="제목을 입력하세요">
            <textarea id="postContent" class="input-body" placeholder="오늘 어떤 일이 있었나요?"></textarea>
            
            <img id="imgPreview" src="" alt="미리보기">

            <div class="editor-actions">
                <label for="imageUpload" class="tool-icon-btn"><i class="ri-image-add-line"></i></label>
                <input type="file" id="imageUpload" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
                <button class="btn-post" onclick="createPost()">게시하기</button>
            </div>
        </div>

        <div id="feedList"></div>
    </div>

    <script>
        let posts = [];
        let currentImageBase64 = null; 
        let selectedTag = '☕ 일상';

        window.onload = renderPosts;

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const icon = document.getElementById('themeToggle');
            icon.classList.toggle('ri-moon-line'); icon.classList.toggle('ri-sun-line');
        }

        function showNotification() {
            const messages = [
                "👀 누군가 당신 글을 보고 있어요",
                "💌 익명 팬이 생겼어요",
                "🔥 당신 글이 핫해지고 있어요",
                "✨ 오늘 가장 공감받은 글이에요",
                "📈 조회수가 급상승 중입니다",
                "😶 누군가 조용히 좋아요를 눌렀어요"
            ];
            const msg = messages[Math.floor(Math.random() * messages.length)];
            const toast = document.createElement('div');
            toast.innerText = msg;
            toast.style.position = 'fixed'; toast.style.top = '80px'; toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)'; toast.style.background = '#1a1a1b';
            toast.style.color = 'white'; toast.style.padding = '12px 18px'; toast.style.borderRadius = '20px';
            toast.style.zIndex = '9999'; toast.style.boxShadow = '0 4px 12px rgba(0,0,0,0.15)';
            document.body.appendChild(toast);
            setTimeout(() => document.body.removeChild(toast), 2000);
        }

        function selectTag(el, tag) {
            document.querySelectorAll('#tagList .tag-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active'); selectedTag = tag;
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => { currentImageBase64 = e.target.result; document.getElementById('imgPreview').src = currentImageBase64; document.getElementById('imgPreview').style.display = 'block'; };
                reader.readAsDataURL(file);
            }
        }

        // 🔥 무작위로 진짜 같은 과거 시간 생성 (1분 전 ~ 3일 전)
        function getRandomTime() {
            const now = new Date();
            const randomOffset = Math.floor(Math.random() * 3 * 24 * 60 * 60 * 1000); // 0~3일(밀리초)
            const pastDate = new Date(now.getTime() - randomOffset);
            
            const diffMs = now - pastDate;
            const diffMins = Math.floor(diffMs / (1000 * 60));
            const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
            const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));

            if (diffMins < 60) return `${diffMins || 1}분 전`;
            if (diffHours < 24) return `${diffHours}시간 전`;
            
            const pad = (n) => n.toString().padStart(2, '0');
            const month = pad(pastDate.getMonth() + 1);
            const day = pad(pastDate.getDate());
            const hours = pad(pastDate.getHours());
            const mins = pad(pastDate.getMinutes());
            
            if (diffDays === 1) return `어제 ${hours}:${mins}`;
            return `${month}/${day} ${hours}:${mins}`;
        }

        function createPost() {
            const title = document.getElementById('postTitle').value.trim();
            const content = document.getElementById('postContent').value.trim();
            if (!title || !content) return alert('내용을 채워주세요!');
            
            posts.unshift({
                id: Date.now(), 
                tag: selectedTag, 
                title, 
                content, 
                image: currentImageBase64,
                author: '익명사용자', 
                views: Math.floor(Math.random() * 500) + 10, 
                likes: Math.floor(Math.random() * 150), 
                bookmarks: Math.floor(Math.random() * 30), 
                date: getRandomTime(), // 🔥 랜덤 시간 적용
                comments: []
            });
            document.getElementById('postTitle').value = ''; document.getElementById('postContent').value = '';
            document.getElementById('imgPreview').style.display = 'none'; currentImageBase64 = null;
            renderPosts();
        }

        function capturePost(id) {
            const post = posts.find(p => p.id === id); 
            const target = document.getElementById(`card-${id}`);
            const bgColor = getComputedStyle(target).backgroundColor;

            const postActions = target.querySelector('.post-actions');
            const btnGroup = target.querySelector('.btn-group');
            const commentActions = target.querySelectorAll('.chat-actions');
            const commentInput = target.querySelector('.comment-input-wrap');
            const commentsBox = target.querySelector('.comments-box'); 

            if(postActions) postActions.style.visibility = 'hidden';
            if(btnGroup) btnGroup.style.display = 'none';
            if(commentInput) commentInput.style.display = 'none';
            commentActions.forEach(a => a.style.visibility = 'hidden');

            if(commentsBox && post.comments.length === 0) {
                commentsBox.style.display = 'none';
            }

            htmlToImage.toPng(target, { backgroundColor: bgColor })
            .then(function (dataUrl) {
                if(postActions) postActions.style.visibility = 'visible';
                if(btnGroup) btnGroup.style.display = 'flex';
                if(commentInput) commentInput.style.display = 'flex';
                commentActions.forEach(a => a.style.visibility = 'visible');
                
                if(commentsBox) {
                    commentsBox.style.display = 'block'; 
                }

                const link = document.createElement('a');
                link.download = `anonymous-post-${id}.png`; 
                link.href = dataUrl; link.click();
            });
        }

        function deletePost(id) { if(confirm("삭제할까요?")) { posts = posts.filter(p => p.id !== id); renderPosts(); } }
        function deleteComment(postId, commentId) { if(confirm("댓글을 삭제할까요?")) { const post = posts.find(p => p.id === postId); post.comments = post.comments.filter(c => c.id !== commentId); renderPosts(); } }
        function editComment(postId, commentId) { const post = posts.find(p => p.id === postId); const comment = post.comments.find(c => c.id === commentId); const newText = prompt("수정할 내용:", comment.text); if(newText) { comment.text = newText; renderPosts(); } }

        function addComment(postId) {
            const input = document.getElementById(`in-${postId}`);
            if (!input.value.trim()) return;
            const post = posts.find(p => p.id === postId);
            post.comments.push({ id: Date.now(), text: input.value });
            input.value = ''; renderPosts();
        }

        function renderPosts() {
            const list = document.getElementById('feedList'); list.innerHTML = '';
            if (posts.length === 0) { list.innerHTML = '<div class="empty-state">이야기를 시작해보세요.</div>'; return; }
            posts.forEach(post => {
                const imageHtml = post.image ? `<img src="${post.image}" class="post-image">` : '';
                const cHtml = post.comments.map(c => `
                    <div class="chat-bubble">
                        <div class="chat-header">
                            <span class="chat-name">익명톡</span>
                            <div class="chat-actions">
                                <button class="chat-action-btn" onclick="editComment(${post.id}, ${c.id})">수정</button>
                                <button class="chat-action-btn" onclick="deleteComment(${post.id}, ${c.id})">삭제</button>
                            </div>
                        </div>
                        <div class="chat-text">${c.text}</div>
                    </div>`).join('');

                list.innerHTML += `
                    <div class="post-card" id="card-${post.id}">
                        <div class="post-header">
                            <div class="post-header-left">
                                <div class="avatar-box">익</div>
                                <div class="post-user-info">
                                    <div class="name-time-row">
                                        <h4 class="post-author">${post.author}</h4>
                                        <p class="post-date">${post.date}</p>
                                    </div>
                                    <span class="post-tag-badge">${post.tag}</span>
                                </div>
                            </div>
                            <div class="post-actions"><button class="post-action-btn delete" onclick="deletePost(${post.id})">삭제</button></div>
                        </div>
                        <div class="post-content"><h3>${post.title}</h3><div class="post-text">${post.content}</div></div>
                        ${imageHtml}
                        <div class="stats-row"><span><i class="ri-eye-line"></i> ${post.views}</span><span><i class="ri-heart-fill" style="color:#ff5252;"></i> ${post.likes}</span><span><i class="ri-bookmark-fill" style="color:#ffb300;"></i> ${post.bookmarks}</span></div>
                        <div class="btn-group">
                            <button class="icon-btn" onclick="alert('복사됨')"><i class="ri-share-forward-line"></i>공유</button>
                            <button class="icon-btn" onclick="capturePost(${post.id})"><i class="ri-screenshot-2-line"></i>캡처</button>
                            <button class="icon-btn" onclick="alert('복사됨')"><i class="ri-file-copy-line"></i>복사</button>
                        </div>
                        <div class="comments-box">
                            ${cHtml}
                            <div class="comment-input-wrap">
                                <input type="text" id="in-${post.id}" class="msg-input" placeholder="따뜻한 댓글을 남겨주세요." onkeypress="if(event.key==='Enter') addComment(${post.id})">
                                <button class="btn-send" onclick="addComment(${post.id})"><i class="ri-send-plane-2-fill"></i></button>
                            </div>
                        </div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
